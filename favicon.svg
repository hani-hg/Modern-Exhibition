  <!-- البرج الأيسر -->
  <rect x="22" y="24" width="9" height="34" rx="2" fill="#ffffff"/>
  <!-- البرج الأيمن -->
  <rect x="69" y="24" width="9" height="34" rx="2" fill="#ffffff"/>
  <!-- كوابل البرج الأيسر -->
  <line x1="26.5" y1="26" x2="5"  y2="56" stroke="#ffd54f" stroke-width="1.8"/>
  <line x1="26.5" y1="26" x2="18" y2="56" stroke="#ffd54f" stroke-width="1.8"/>
  <line x1="26.5" y1="26" x2="35" y2="56" stroke="#ffd54f" stroke-width="1.8"/>
  <line x1="26.5" y1="26" x2="50" y2="58" stroke="#ffd54f" stroke-width="1.8"/>
  <!-- كوابل البرج الأيمن -->
  <line x1="73.5" y1="26" x2="95" y2="56" stroke="#ffd54f" stroke-width="1.8"/>
  <line x1="73.5" y1="26" x2="82" y2="56" stroke="#ffd54f" stroke-width="1.8"/>
  <line x1="73.5" y1="26" x2="65" y2="56" stroke="#ffd54f" stroke-width="1.8"/>
  <line x1="73.5" y1="26" x2="50" y2="58" stroke="#ffd54f" stroke-width="1.8"/>
  <!-- قمة البرج الأيسر -->
  <polygon points="26.5,14 20,24 33,24" fill="#ffd54f"/>
  <!-- قمة البرج الأيمن -->
  <polygon points="73.5,14 67,24 80,24" fill="#ffd54f"/>
  <!-- نص صغير -->
  <text x="50" y="96" text-anchor="middle" font-size="7.5" fill="#90caf9" font-family="Arial,sans-serif" font-weight="bold">دير الزور</text>
