<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Exhibition - كتالوج الأثاث</title>
    
    <!-- الأيقونات -->
    <link rel="icon" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    
    <!-- CSS -->
    <link rel="stylesheet" href="CSS/style.css">
    
    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "modern-exhibition.firebaseapp.com",
            projectId: "modern-exhibition",
            storageBucket: "modern-exhibition.firebasestorage.app",
            messagingSenderId: "870468289709",
            appId: "1:870468289709:web:fe0ca644c24e37f818b224"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // حفظ في window للاستخدام العالمي
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
    </script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>🏛️ Modern Exhibition</h1>
                <p>كتالوج الأثاث والألمنيوم</p>
            </div>
            <nav>
                <a href="#" onclick="showProducts()">المنتجات</a>
                <a href="#" onclick="showAddProduct()">إضافة منتج</a>
            </nav>
        </div>
    </header>

    <!-- المحتوى الرئيسي -->
    <main>
        <div id="content">
            <!-- سيتم تحميل المحتوى هنا -->
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>© 2024 Modern Exhibition - جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
    <script src="js/ads.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/slider.js"></script>
</body>
</html>
