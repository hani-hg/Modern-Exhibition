<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الأثاث العصري</title>
    <style>
        /* تنسيقات عامة */
        body { font-family: 'Tahoma', sans-serif; margin: 0; background: #f5f5f5; direction: rtl; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* الشعار والقائمة */
        .header { background: #2c3e50; color: white; padding: 15px 0; text-align: center; }
        .header h1 { margin: 0; font-size: 2em; }
        
        /* أقسام المنتجات */
        .categories { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        .cat-btn { background: #3498db; color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; }
        
        /* شبكة المنتجات */
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 10px; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-card img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        
        /* نموذج الاتصال */
        .contact-form { background: white; padding: 30px; border-radius: 10px; margin-top: 30px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn { background: #27ae60; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>🛋️ معرض الأثاث العصري</h1>
    <p>أبواب · شبابيك · مطابخ · غرف نوم</p>
</div>

<div class="container">

    <!-- أقسام المنتجات -->
    <div class="categories">
        <a href="#" class="cat-btn">🚪 أبواب ألمنيوم</a>
        <a href="#" class="cat-btn">🪟 شبابيك</a>
        <a href="#" class="cat-btn">🍳 مطابخ</a>
        <a href="#" class="cat-btn">🛏️ غرف نوم</a>
        <a href="#" class="cat-btn">🛋️ غرف جلوس</a>
    </div>

    <!-- عرض المنتجات -->
    <h2>🌟 منتجات مميزة</h2>
    <div class="products" id="productList">
        <!-- سيتم إضافة المنتجات هنا بواسطة JavaScript -->
    </div>

    <!-- نموذج طلب عرض سعر -->
    <div class="contact-form">
        <h2>📩 اطلب عرض سعر</h2>
        <form id="contactForm">
            <input type="text" placeholder="الاسم الكامل" required>
            <input type="tel" placeholder="رقم الهاتف" required>
            <input type="text" placeholder="المنتج المطلوب">
            <textarea rows="4" placeholder="تفاصيل الطلب..."></textarea>
            <button type="submit" class="btn">إرسال الطلب</button>
        </form>
    </div>

</div>

<script>
    // قائمة المنتجات (يمكنك تعديلها)
    const products = [
        { name: 'باب ألمنيوم سحاب', price: 'طلب سعر', image: 'https://via.placeholder.com/250x200/3498db/fff?text=باب+ألمنيوم' },
        { name: 'شباك درفلة', price: 'طلب سعر', image: 'https://via.placeholder.com/250x200/2ecc71/fff?text=شباك' },
        { name: 'مطبخ ألمنيوم عصري', price: 'طلب سعر', image: 'https://via.placeholder.com/250x200/e67e22/fff?text=مطبخ' },
        { name: 'غرفة نوم خشبية', price: 'طلب سعر', image: 'https://via.placeholder.com/250x200/9b59b6/fff?text=غرفة+نوم' }
    ];

    // عرض المنتجات في الصفحة
    const container = document.getElementById('productList');
    products.forEach(p => {
        container.innerHTML += `
            <div class="product-card">
                <img src="${p.image}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p>💰 ${p.price}</p>
                <button class="btn" onclick="alert('سيتم التواصل معك قريباً')">اطلب السعر</button>
            </div>
        `;
    });
</script>

</body>
</html>
