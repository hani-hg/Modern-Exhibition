<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الأثاث العصري</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', Arial, sans-serif; background: #f8f9fa; direction: rtl; }
        .container { max-width: 1200px; margin: auto; padding: 0 20px; }

        /* الهيدر */
        .header { background: #2c3e50; color: #fff; padding: 20px 0; text-align: center; }
        .header h1 { font-size: 2.2rem; margin-bottom: 5px; }
        .header p { font-size: 1.1rem; opacity: 0.8; }

        /* أزرار الأقسام */
        .categories { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 30px 0; }
        .cat-btn { background: #3498db; color: #fff; padding: 10px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; transition: 0.3s; border: none; cursor: pointer; font-size: 1rem; }
        .cat-btn:hover { background: #2980b9; transform: scale(1.05); }

        /* شبكة المنتجات */
        .section-title { font-size: 1.8rem; margin: 30px 0 20px; color: #2c3e50; border-right: 5px solid #3498db; padding-right: 15px; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .product-card { background: #fff; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; background: #e9ecef; }
        .product-card h3 { margin: 12px 0 5px; color: #2c3e50; }
        .product-card p { color: #27ae60; font-weight: bold; font-size: 1.1rem; }
        .btn { background: #27ae60; color: #fff; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: #219a52; transform: scale(1.02); }

        /* نموذج الاتصال */
        .contact-form { background: #fff; padding: 30px; border-radius: 12px; margin: 40px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .contact-form h2 { margin-bottom: 20px; color: #2c3e50; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ced4da; border-radius: 8px; font-size: 1rem; }
        .contact-form button { width: 100%; padding: 14px; font-size: 1.1rem; }

        /* الفوتر */
        .footer { background: #2c3e50; color: #fff; text-align: center; padding: 20px; margin-top: 30px; }
        .footer a { color: #3498db; text-decoration: none; }

        /* توافق مع الجوال */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.6rem; }
            .products { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- الهيدر -->
<div class="header">
    <h1>🛋️ معرض الأثاث العصري</h1>
    <p>أبواب · شبابيك · مطابخ · غرف نوم</p>
</div>

<div class="container">

    <!-- أزرار الأقسام -->
    <div class="categories">
        <button class="cat-btn" onclick="filterProducts('all')">الكل</button>
        <button class="cat-btn" onclick="filterProducts('doors')">🚪 أبواب</button>
        <button class="cat-btn" onclick="filterProducts('windows')">🪟 شبابيك</button>
        <button class="cat-btn" onclick="filterProducts('kitchens')">🍳 مطابخ</button>
        <button class="cat-btn" onclick="filterProducts('bedrooms')">🛏️ غرف نوم</button>
        <button class="cat-btn" onclick="filterProducts('living')">🛋️ غرف جلوس</button>
    </div>

    <!-- عرض المنتجات -->
    <h2 class="section-title">🌟 منتجات مميزة</h2>
    <div class="products" id="productList"></div>

    <!-- نموذج طلب عرض سعر -->
    <div class="contact-form" id="contact">
        <h2>📩 اطلب عرض سعر</h2>
        <form onsubmit="event.preventDefault(); alert('تم إرسال طلبك، سنتواصل معك قريباً 📞');">
            <input type="text" placeholder="الاسم الكامل" required>
            <input type="tel" placeholder="رقم الهاتف" required>
            <input type="text" placeholder="المنتج المطلوب">
            <textarea rows="4" placeholder="تفاصيل الطلب..."></textarea>
            <button type="submit" class="btn">إرسال الطلب</button>
        </form>
    </div>

</div>

<!-- الفوتر -->
<div class="footer">
    <p>© 2026 معرض الأثاث العصري - جميع الحقوق محفوظة</p>
    <p>للتواصل: <a href="mailto:info@example.com">info@example.com</a></p>
</div>

<script>
    // قائمة المنتجات (استبدل الروابط والبيانات حسب رغبتك)
    const allProducts = [
        { id: 1, name: 'باب ألمنيوم سحاب - فاخر', category: 'doors', price: 'طلب سعر', image: 'https://placehold.co/400x300/3498db/fff?text=باب+سحاب' },
        { id: 2, name: 'باب ألمنيوم مفصلي - موديل 2', category: 'doors', price: 'طلب سعر', image: 'https://placehold.co/400x300/2ecc71/fff?text=باب+مفصلي' },
        { id: 3, name: 'شباك درفلة ألمنيوم', category: 'windows', price: 'طلب سعر', image: 'https://placehold.co/400x300/e67e22/fff?text=شباك+درفلة' },
        { id: 4, name: 'شباك بانوراما (زجاجي)', category: 'windows', price: 'طلب سعر', image: 'https://placehold.co/400x300/9b59b6/fff?text=شباك+بانوراما' },
        { id: 5, name: 'مطبخ ألمنيوم عصري', category: 'kitchens', price: 'طلب سعر', image: 'https://placehold.co/400x300/e74c3c/fff?text=مطبخ+عصري' },
        { id: 6, name: 'مطبخ خشبي - كلاسيك', category: 'kitchens', price: 'طلب سعر', image: 'https://placehold.co/400x300/f39c12/fff?text=مطبخ+كلاسيك' },
        { id: 7, name: 'غرفة نوم خشبية - موديل أنيق', category: 'bedrooms', price: 'طلب سعر', image: 'https://placehold.co/400x300/1abc9c/fff?text=غرفة+نوم' },
        { id: 8, name: 'غرفة نوم ألمنيوم - عصرية', category: 'bedrooms', price: 'طلب سعر', image: 'https://placehold.co/400x300/34495e/fff?text=غرفة+نوم+عصرية' },
        { id: 9, name: 'غرفة جلوس - فاخرة', category: 'living', price: 'طلب سعر', image: 'https://placehold.co/400x300/8e44ad/fff?text=غرفة+جلوس' },
        { id: 10, name: 'طقم سفرة - مودرن', category: 'living', price: 'طلب سعر', image: 'https://placehold.co/400x300/16a085/fff?text=سفرة' }
    ];

    // دالة عرض المنتجات حسب التصنيف
    function displayProducts(category = 'all') {
        const container = document.getElementById('productList');
        const filtered = category === 'all' ? allProducts : allProducts.filter(p => p.category === category);
        
        container.innerHTML = filtered.map(p => `
            <div class="product-card">
                <img src="${p.image}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p>💰 ${p.price}</p>
                <button class="btn" onclick="alert('سيتم التواصل معك لتقديم عرض سعر للـ ${p.name} 📞')">اطلب السعر</button>
            </div>
        `).join('');
    }

    // دالة التصفية عند الضغط على الأزرار
    function filterProducts(category) {
        displayProducts(category);
        // التمرير إلى قسم المنتجات
        document.querySelector('.section-title').scrollIntoView({ behavior: 'smooth' });
    }

    // عرض جميع المنتجات عند تحميل الصفحة
    displayProducts('all');
</script>

</body>
</html>
